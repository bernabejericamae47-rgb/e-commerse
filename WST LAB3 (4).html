<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UEPSHOP - Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="WST LAB3 (3).html" class="flex-center" style="margin-bottom: 2rem;">
        <button>← BACK TO PRODUCT</button>
    </a>

    <div class="container">
        <header>
            <h1 class="text-center mb-2">YOUR SHOPPING CART</h1>
        </header>

        <!-- CART ITEMS - FLEXBOX (TASK 4) -->
        <ul style="list-style: none; padding: 0; margin-bottom: 2rem;">
            <li class="cart-item">
                <img src="https://via.placeholder.com/100x100/2c3e50/ffffff?text=👂" alt="Headphones">
                <div>
                    <h3>Wireless Headphones</h3>
                    <p class="price">$29.99</p>
                    <label for="qty1">Quantity:</label>
                    <input type="number" id="qty1" name="qty1" min="1" value="1" style="width: 80px;">
                </div>
            </li>

            <li class="cart-item">
                <img src="https://via.placeholder.com/100x100/e67e22/ffffff?text=👟" alt="Adidas Shoes">
                <div>
                    <h3>Adidas Running Shoes</h3>
                    <p class="price">$49.99</p>
                    <label for="qty2">Quantity:</label>
                    <input type="number" id="qty2" name="qty2" min="1" value="1" style="width: 80px;">
                </div>
            </li>
        </ul>

        <div style="background: var(--card-bg); padding: 2rem; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2>Subtotal:</h2>
                <h2 class="price">$79.98</h2>
            </div>
            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <a href="WST LAB3 (5).html" style="flex: 1; min-width: 200px;">
                    <button style="width: 100%;">Proceed to Checkout →</button>
                </a>
                <a href="WST LAB3 (2).html">
                    <button style="background: #95a5a6; width: 150px;">Continue Shopping</button>
                </a>
            </div>
        </div>

        <section id="empty-cart" style="display: none; text-align: center; padding: 3rem; background: #fff3cd; border: 2px dashed #ffc107; border-radius: 12px;">
            <h2>Your cart is empty</h2>
            <p>Start shopping to add items to your cart!</p>
            <a href="WST LAB3 (2).html"><button>Browse Products</button></a>
        </section>
    </div>
</body>
</html>
